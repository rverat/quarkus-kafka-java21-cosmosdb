quarkus.http.port=8080
quarkus.application.name=monetary-tx-svc
quarkus.application.version=1.0.0

# === Cosmos DB ===
cosmos.endpoint=${COSMOS_ENDPOINT:https://localhost:8081}
cosmos.key=${COSMOS_KEY:dummy-key-for-dev}
cosmos.database=banking
cosmos.container.transactions=monetary_transactions
cosmos.container.leases=monetary_leases
cosmos.preferred-regions=East US,West US
cosmos.consistency-level=Session

# === Kafka Producer (durabilidad estricta) ===
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}
kafka.client.id=monetary-tx-producer
kafka.acks=all
kafka.enable.idempotence=true
kafka.max.in.flight.requests.per.connection=1
kafka.retries=10
kafka.delivery.timeout.ms=120000
kafka.request.timeout.ms=30000
kafka.linger.ms=5
kafka.compression.type=lz4
kafka.topic.success=monetary-transactions-success
kafka.topic.dlq=monetary-transactions-dlq

# === Change Feed Processor ===
changefeed.host-name=${HOSTNAME:node-local}
changefeed.lease-prefix=monetary-outbox-
changefeed.max-items-per-batch=100

# === Identidad de nodo (header enrichment) ===
app.node-id=${HOSTNAME:unknown-node}
app.version=${quarkus.application.version}

# === Logging ===
quarkus.log.level=INFO
quarkus.log.category."com.bank.monetary".level=DEBUG
